name: gymtap
description: Aplicativo de treino de musculação focado em praticidade e rapidez.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Gerenciamento de estado
  flutter_riverpod: ^2.5.1

  # Banco de dados local (Offline First)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # Firebase (nuvem / sincronização)
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  google_sign_in: ^6.2.1

  # Conectividade (necessário para a estratégia offline first)
  connectivity_plus: ^6.0.3

  # Geração de ids estáveis (idNuvem) para sincronização com o Firebase
  uuid: ^4.4.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Geração de código do Isar
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
